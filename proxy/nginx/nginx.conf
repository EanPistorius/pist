events {}

http {
    # 🔓 HTTP → HTTPS redirect + cert challenge
    server {
        listen 80;
        server_name pistoriusies.co.za trou.pistoriusies.co.za;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }
        # 🔒 HTTPS — UI
    server {
        listen 443 ssl;
        server_name trou.pistoriusies.co.za;

        ssl_certificate /etc/letsencrypt/live/pistoriusies.co.za/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pistoriusies.co.za/privkey.pem;

        location / {
            proxy_pass http://ui:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
        # 🔒 HTTPS — main site + API
    server {
        listen 443 ssl;
        server_name pistoriusies.co.za;

        ssl_certificate /etc/letsencrypt/live/pistoriusies.co.za/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pistoriusies.co.za/privkey.pem;

        location / {
            root /usr/share/nginx/html;
            index 7-Nov.html;
        }

        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
