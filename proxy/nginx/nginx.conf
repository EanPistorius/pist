events {}

http {

    server {
        listen 80 default_server;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
    server {
        listen 80;
        server_name pistoriusies.co.za www.pistoriusies.co.za;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }

    server {
        listen 80;
        server_name trou.pistoriusies.co.za;

        location / {
            proxy_pass http://ui:3000;
        }

        location /api/ {
            proxy_pass http://api:8000/;
        }
    }
}
